<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test of Github</title>
</head>
<body>
    <header>
        <h1>This is the main title</h1>
        <!-- you have different levels of headers - h1 through h6 -->
        <h2>This is a sub header</h2>
    </header>
    <main>
        <!-- add an image -->
         <!-- image require a src (source) attribute which tells
          the browser where the images is,
          and an alt attribute, which describes the image for
          search engines and screen readers -->
        <img src="images/tabbykitten.jpg" alt="A tabby kitten meowing in a field of grass">
    </main>
    <footer>
        <!-- the & character entities allow you to enter special
         characters-->
        <p>&copy; 2026</p>
    </footer>
</body>
</html>
